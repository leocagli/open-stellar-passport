name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Run contract tests
        run: cargo test --manifest-path contracts/agent-passport-validator/Cargo.toml
      - name: Build validator WASM
        run: cargo build --manifest-path contracts/agent-passport-validator/Cargo.toml --target wasm32v1-none --release

  circuit:
    name: Circuit artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify committed verification key
        run: npm test

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build

  sdk-bindings:
    name: SDK bindings
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/bindings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/bindings/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
